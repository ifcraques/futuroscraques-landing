<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 110" width="200" height="110">
  <rect width="200" height="110" fill="white" rx="4"/>

  <!-- Figuras esportivas estilizadas em azul (nadador, ciclista, corredor) -->

  <!-- Nadador (esquerda, azul claro) -->
  <g fill="#1565C0" transform="translate(10,8)">
    <circle cx="18" cy="10" r="8"/>
    <path d="M8 20 Q18 16 28 20 L26 35 Q18 38 10 35 Z"/>
    <path d="M8 22 Q2 30 0 38 L6 38 Q8 30 12 24Z"/>
    <path d="M28 22 Q34 26 36 32 L30 34 Q28 28 24 24Z"/>
  </g>

  <!-- Ciclista (centro, azul médio) -->
  <g fill="#1976D2" transform="translate(60,5)">
    <circle cx="20" cy="12" r="8"/>
    <path d="M14 24 Q20 20 26 24 L28 40 Q20 44 12 40 Z"/>
    <circle cx="10" cy="52" r="10" fill="none" stroke="#1976D2" stroke-width="4"/>
    <circle cx="30" cy="52" r="10" fill="none" stroke="#1976D2" stroke-width="4"/>
    <line x1="20" y1="40" x2="10" y2="48" stroke="#1976D2" stroke-width="3"/>
    <line x1="20" y1="40" x2="30" y2="48" stroke="#1976D2" stroke-width="3"/>
  </g>

  <!-- Corredor (direita, azul escuro) -->
  <g fill="#0D47A1" transform="translate(118,5)">
    <circle cx="20" cy="12" r="8"/>
    <path d="M14 24 Q20 20 26 24 L22 44 L28 44 L24 28 L32 20 L28 16Z"/>
    <line x1="22" y1="44" x2="16" y2="60" stroke="#0D47A1" stroke-width="4" stroke-linecap="round"/>
    <line x1="28" y1="44" x2="34" y2="58" stroke="#0D47A1" stroke-width="4" stroke-linecap="round"/>
    <line x1="16" y1="28" x2="8" y2="38" stroke="#0D47A1" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="26" x2="32" y2="34" stroke="#0D47A1" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- SP grande -->
  <text x="158" y="72" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="#1565C0">SP</text>

  <!-- Linha -->
  <line x1="12" y1="84" x2="188" y2="84" stroke="#1565C0" stroke-width="1.5"/>

  <!-- Texto -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1565C0" text-anchor="middle" letter-spacing="1">LEI DE INCENTIVO AO ESPORTE</text>
</svg>
