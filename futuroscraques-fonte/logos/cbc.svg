<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fundo azul escuro com bordas arredondadas -->
  <rect width="200" height="200" fill="#1a3a8c" rx="14"/>

  <!-- Atleta correndo estilizado (fiel ao logo CBC) -->
  <g fill="white">
    <!-- Cabeça -->
    <circle cx="122" cy="28" r="11"/>
    <!-- Corpo inclinado para frente (tronco) -->
    <path d="M112 42 Q100 58 90 72 L104 78 Q112 64 118 50 Q130 44 142 34 L134 24 Q124 34 112 42Z"/>
    <!-- Braço esquerdo estendido para baixo/trás -->
    <path d="M110 52 Q96 60 86 72 L92 78 Q102 66 114 58Z"/>
    <!-- Perna direita dobrada para frente -->
    <path d="M96 76 Q90 88 94 100 Q100 108 106 104 Q104 94 100 82Z"/>
    <!-- Perna esquerda estendida para trás -->
    <path d="M104 78 Q96 90 88 100 L96 104 Q104 92 112 80Z"/>
  </g>

  <!-- Linha horizontal branca divisória -->
  <line x1="20" y1="122" x2="180" y2="122" stroke="white" stroke-width="1.2" opacity="0.5"/>

  <!-- FORMAÇÃO DE ATLETAS -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13" font-weight="900" fill="white" letter-spacing="0.8">FORMAÇÃO DE ATLETAS</text>

  <!-- Linha fina separadora -->
  <line x1="20" y1="151" x2="180" y2="151" stroke="white" stroke-width="0.8" opacity="0.4"/>

  <!-- CBC grande -->
  <text x="55" y="176" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="23" font-weight="900" fill="white">CBC</text>

  <!-- Linha vertical -->
  <line x1="80" y1="156" x2="80" y2="182" stroke="white" stroke-width="1.2" opacity="0.7"/>

  <!-- COMITÊ BRASILEIRO DE CLUBES -->
  <text x="132" y="168" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9.5" font-weight="700" fill="white" letter-spacing="0.3">COMITÊ BRASILEIRO</text>
  <text x="132" y="180" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9.5" font-weight="700" fill="white" letter-spacing="0.3">DE CLUBES</text>
</svg>
