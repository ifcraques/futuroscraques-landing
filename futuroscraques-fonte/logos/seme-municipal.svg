<svg viewBox="0 0 250 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield shape background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B1428;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M 125 20 L 180 50 L 180 110 C 180 150 125 170 125 170 C 125 170 70 150 70 110 L 70 50 Z"
        fill="url(#shieldGradient)" stroke="#004d1a" stroke-width="2"/>

  <!-- Crown on top -->
  <g transform="translate(125, 35)">
    <path d="M -15 0 L -10 -8 L -5 -5 L 0 -10 L 5 -5 L 10 -8 L 15 0 Z"
          fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
    <circle cx="-10" cy="-8" r="2.5" fill="#FFD700"/>
    <circle cx="0" cy="-10" r="2.5" fill="#FFD700"/>
    <circle cx="10" cy="-8" r="2.5" fill="#FFD700"/>
  </g>

  <!-- Text in shield -->
  <text x="125" y="105" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" font-weight="bold" fill="white">CIDADE DE</text>
  <text x="125" y="120" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" font-weight="900" fill="white" letter-spacing="1">SÃO PAULO</text>

  <!-- Bottom text -->
  <text x="125" y="150" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="9" fill="white" font-weight="600">ESPORTES E LAZER</text>

  <!-- Decorative elements - leaves -->
  <g transform="translate(70, 130)">
    <path d="M 0 0 Q 3 -5 5 -8" stroke="#004d1a" stroke-width="1.5" fill="none"/>
    <ellipse cx="4" cy="-6" rx="2" ry="3" fill="#004d1a" opacity="0.7"/>
  </g>

  <g transform="translate(180, 130)">
    <path d="M 0 0 Q -3 -5 -5 -8" stroke="#004d1a" stroke-width="1.5" fill="none"/>
    <ellipse cx="-4" cy="-6" rx="2" ry="3" fill="#004d1a" opacity="0.7"/>
  </g>
</svg>