<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" width="280" height="90">
  <rect width="280" height="90" fill="white" rx="4"/>

  <!-- Brasão Cidade de São Paulo simplificado -->
  <g transform="translate(10, 8)">
    <!-- Escudo forma -->
    <path d="M36 4 L62 4 L62 52 Q49 66 36 52 Z" fill="#002776"/>
    <path d="M36 4 L10 4 L10 52 Q23 66 36 52 Z" fill="#009C3B"/>
    <!-- Cruz branca no escudo -->
    <rect x="31" y="8" width="10" height="44" fill="white" opacity="0.9"/>
    <rect x="12" y="24" width="48" height="10" fill="white" opacity="0.9"/>
    <!-- Coroa dourada -->
    <path d="M16 4 L21 0 L26 3 L31 0 L36 3 L41 0 L46 3 L51 0 L56 4 Z" fill="#F7B731"/>
  </g>

  <!-- Texto CIDADE DE -->
  <text x="80" y="26" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#444444" letter-spacing="1">CIDADE DE</text>
  <!-- Texto SÃO PAULO grande -->
  <text x="78" y="54" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#111111" letter-spacing="-0.5">SÃO PAULO</text>
  <!-- Texto ESPORTES E LAZER -->
  <text x="80" y="72" font-family="Arial, sans-serif" font-size="10" fill="#555555" letter-spacing="1.5">ESPORTES E LAZER</text>
</svg>
